# preferences.example.yml
# Copy this file to preferences.yml and adapt to your use case.
# This file defines how the daily digest scores and filters results.
# The structure below is designed for a job search digest.
# Adapt the keyword categories and scoring weights to your own domain.

# Keywords that match your target (role titles, topics, companies, etc.)
primary_keywords:
  - "your main target keyword"
  - "another primary keyword"

# Secondary keywords — relevant but not the main signal
secondary_keywords:
  - "adjacent keyword"
  - "related topic or technology"
  - "another secondary signal"

# Keywords that strongly indicate a good result
must_have_keywords:
  - "core requirement"
  - "key qualifier"
  - "non-negotiable signal"

# Keywords that are a bonus but not required
nice_to_have_keywords:
  - "bonus signal"
  - "adjacent skill or topic"
  - "nice extra"

# Keywords that indicate a poor fit — results with these are scored down or filtered
avoid_keywords:
  - "signal that rules out a result"
  - "another disqualifier"

# Optional: seniority or level filter
# Adapt or remove if not relevant to your use case
level_target: "mid"

# Optional: location or scope filter
preferred_scope:
  primary:
    - "Your preferred location or scope"
    - "Remote"
  acceptable:
    - "Acceptable alternative"
  rules:
    - "Define any hard rules here"

# Scoring weights — must add up to 100
# Adjust to reflect what matters most in your use case
scoring_weights:
  primary: 30
  secondary: 20
  must_have: 20
  nice_to_have: 10
  level: 10
  scope: 10

# Score thresholds for output
thresholds:
  notify_min_score: 50   # minimum score to send a notification
  save_min_score: 40     # minimum score to save to markdown

# Positioning — used by the LLM scorer to evaluate fit
# Describe what you are looking for in plain language
positioning:
  context: "Describe what you are looking for in a few words"
  not_a_fit:
    - "what does not qualify"
    - "another disqualifier"
  strengths:
    - "what signals a strong match"
    - "another positive signal"
